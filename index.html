<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Arrow Flow | Zen Puzzle Game</title>
    <meta name="description" content="Arrow Flow is a minimalist, Zen-like puzzle game. Strategize your moves to release arrows and clear satisfying patterns through infinite levels." />
    <meta name="keywords" content="puzzle game, arrow flow, zen game, minimalist puzzle, strategy game" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Arrow Flow | Zen Puzzle Game" />
    <meta property="og:description" content="Clear satisfies patterns and strategize your moves in this minimalist puzzle experience." />
    <meta property="og:image" content="/icon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Arrow Flow | Zen Puzzle Game" />
    <meta property="twitter:description" content="Clear satisfies patterns and strategize your moves in this minimalist puzzle experience." />
    <meta property="twitter:image" content="/icon.png" />

    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      .loading-logo {
        width: 172px;
        height: 84px;
        object-fit: contain;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1.02); }
      }
      @media (min-width: 768px) {
        .loading-logo {
          width: 240px;
          height: auto;
        }
      }
    </style>
  </head>
  <body style="background-color: #1C1E2B; margin: 0; padding: 0; user-select: none;">
    <div id="root">
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #1C1E2B;">
        <img src="/src/icons/logo.png" class="loading-logo" alt="Arrow Flow" />
        <div style="margin-top: 24px; color: #65A9F7; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;">
          Loading Flow
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
